blockers:
  - Combined inference needs fix - UnetHead forward_mode handling incorrect
  - Need to use mode != TEXTDET_MASK and != TEXTDET_DET to get (mask, features) tuple

questions:
  - Should combined model also include NMS post-processing for better precision?
  - Is conf_threshold 0.1 appropriate or should model be retrained for higher confidence?

decisions:
  - strip_compile_prefix: torch.compile adds _orig_mod. prefix to state dict keys, must strip before loading
  - conf_threshold_0.1: Lower threshold needed because o2o head outputs lower confidence by design

findings:
  - weight_loading_bug: |
      EMA weights had _orig_mod. prefix from torch.compile during training.
      Fresh inference model doesn't have this prefix, causing silent load failure with strict=False.
      Result: o2o head had random weights (confidence ~0.5 for everything).
      Fix: Strip prefix in src/inference/detector.py before load_state_dict.
  - checkpoint_structure: |
      Phase 1 (seg): backbone + seg_net (218 keys)
      Phase 2 (det): backbone + seg_net (109 partial) + dbnet (110 keys)
      Phase 3 (block): backbone + seg_net (218 keys) + block_det (48 keys)
      Each phase only saves trainable params - need to combine all 3 for full model.
  - output_format_comparison: |
      Original CTD: blk [1,64512,7], seg [1,1,1024,1024], det [1,2,1024,1024]
      Our YOLO26: blk only (mask/lines zeros in block mode)
      Format differs: CTD uses [cx,cy,w,h,obj,cls0,cls1], ours uses decoded [x,y,w,h,conf,cls]
  - evaluation_results: |
      At conf>0.1: P=0.116, R=0.594, F1=0.194
      At conf>0.15: P=0.292, R=0.328, F1=0.309
      Model detects text lines, GT has block-level boxes - granularity mismatch
  - speed_comparison: |
      YOLO26 PyTorch: 38.8ms avg
      Reference ONNX: 15.4ms avg
      Expected - ONNX optimized, ours not exported yet

worked:
  - Stripping _orig_mod. prefix fixed weight loading completely
  - TextDetector class properly initializes block_det when training_phase >= 3
  - Visualization shows good text detection on manga images

failed:
