blockers:
  - Hybrid unified training agent still running (agent a3cd268)

questions:
  - Should we use ProgLoss (dynamic loss weighting) from YOLO26?
  - Should we implement STAL (small-target-aware label assignment)?
  - GT is block-level but model detects line-level - accept or re-annotate?

decisions:
  - hybrid_over_phased: 3-phase training causes weight corruption and poor feature sharing
  - obj_x_cls_confidence: YOLO confidence should be objectness × class_score, not just objectness
  - bias_init_2: DBNet binarize head needs positive bias init to avoid sigmoid(0)=0.5
  - balanced_loss_weights: Box loss was dominating (5.0 vs 1.5 obj), rebalanced for confidence
  - keep_unet_layers: Deleting upconv3-6 after initialize_db broke checkpoint loading

findings:
  - original_ctd_architecture: |
      Original uses 2-phase (seg+det) + separate YOLOv5 block detector.
      We tried 3-phase integrated approach which introduced more bugs.
  - granularity_mismatch: |
      GT has 22 block-level boxes, model detects 113 line-level boxes.
      This is expected behavior (5.1x ratio = ~5 lines per block).
  - dbnet_weak_output: |
      Max shrink_map 0.6 caused by: no bias init + beta=2.0 loss imbalance.
      Fix: bias=2.0 init + beta=1.0 loss weight.
  - block_low_confidence: |
      Max confidence 0.097 caused by: using pred[4] only (not obj×cls),
      FocalLoss alpha=0.25 (3x background weight), box loss dominating.
  - yolo26_missing_features: |
      Not using ProgLoss (dynamic weighting), STAL (small target), MuSGD optimizer.

worked:
  - 10 parallel research agents provided comprehensive analysis
  - 10 parallel fix agents completed all quick fixes efficiently
  - TextDetectorInference class correctly combines all heads for inference
  - combined_inference.py properly loads weights from 3 separate checkpoints

failed:
  - 3-phase sequential training had weight corruption and poor feature sharing
  - Phase 2 deleted seg_net layers causing checkpoint incompatibility
  - Using only pred[4] for confidence gave ~0.1 instead of ~0.5

